server:
  port: ${APP_PORT:8080}

application:
  name: mailboom-api
  security:
    encryption-key: ${ENCRYPTION_KEY}
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 86400000 # 24 hours
      refresh-token:
        expiration: 604800000 # 7 days

mailboom:
  system:
    email: info@mailboom.email
  domain: mailboom.email

spring:
  cloud:
    aws:
      region: ${AWS_REGION}
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}

      stack:
        auto: false
  datasource:
    url: jdbc:postgresql://mailboom-db:5432/${POSTGRES_DB:mydatabase}
    username: ${POSTGRES_USER:myuser}
    password: ${POSTGRES_PASSWORD:mypassword}
  jpa:
    ddl-auto: update
    show-sql: true
    generate-ddl: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 500
        order_inserts: true
        order_updates: true


logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    com.mailboom.api: DEBUG

whatsapp:
  phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID}
  access-token: ${WHATSAPP_ACCESS_TOKEN}
  connection-timeout: 10000
  read-timeout: 30000
  business-account-id: ${WHATSAPP_BUSINESS_ACCOUNT_ID}

  api:
    url: https://graph.facebook.com/v18.0