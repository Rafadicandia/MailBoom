name: LinkedIn Bot via Telegram
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Datos
        run: |
          head -n 50 README.md > readme_snippet.txt
          git log --since="24 hours ago" --pretty=format:"- %s" > commits.txt
          if [ ! -s commits.txt ]; then echo "SKIP=true" >> $GITHUB_ENV; fi

      - name: Generar Post con Gemini
        if: env.SKIP != 'true'
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          CONTEXT=$(jq -Rs . < readme_snippet.txt)
          COMMITS=$(jq -Rs . < commits.txt)

          # Usamos jq para construir el JSON perfecto
          JSON_DATA=$(jq -n \
            --arg ctx "$CONTEXT" \
            --arg cmt "$COMMITS" \
            '{contents: [{parts: [{text: ("Escribe un post breve para LinkedIn en español basado en esto. Contexto: " + $ctx + " Cambios: " + $cmt)}]}]}')

          # LLAMADA A v1beta (La que sí funciona con flash)
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_KEY" \
            -H 'Content-Type: application/json' \
            -d "$JSON_DATA")

          # Extraemos el texto o capturamos el error
          RESULT=$(echo $RESPONSE | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$RESULT" ]; then
            RESULT="Error de la API: $(echo $RESPONSE | jq -c .)"
          fi
          
          echo "FINAL_POST<<EOF" >> $GITHUB_ENV
          echo "$RESULT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Enviar a Telegram
        if: env.SKIP != 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            <b>📝 Borrador para LinkedIn</b>

            ${{ env.FINAL_POST }}
