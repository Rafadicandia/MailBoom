name: LinkedIn Bot via Telegram
on:
  schedule:
    - cron: '0 21 * * *' # 9 PM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Esto elimina la advertencia y fuerza el uso de la versión más moderna
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Contexto y Commits
        id: collect_data
        run: |
          # Leemos el README y lo convertimos en un formato seguro para JSON
          README_RAW=$(head -n 50 README.md || echo "No hay README")
          
          # TRUCO: Usamos jq para que limpie comillas y caracteres raros
          APP_CONTEXT=$(echo "$README_RAW" | jq -aRs .)
          
          # Hacemos lo mismo con los commits
          COMMITS_RAW=$(git log --since="24 hours ago" --pretty=format:"- %s")

          if [ -z "$COMMITS_RAW" ]; then
            echo "SKIP=true" >> $GITHUB_ENV
          else
            COMMITS_SAFE=$(echo "$COMMITS_RAW" | jq -aRs .)
            echo "APP_CONTEXT=$APP_CONTEXT" >> $GITHUB_ENV
            echo "DAILY_COMMITS=$COMMITS_SAFE" >> $GITHUB_ENV
          fi

      - name: Generar Post con Gemini
        if: env.SKIP != 'true'
        run: |
          # Ahora enviamos las variables directamente, que ya vienen con sus propias comillas seguras
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"contents\": [{
                \"parts\":[{
                  \"text\": \"Eres un desarrollador. Contexto: ${{ env.APP_CONTEXT }}. Commits: ${{ env.DAILY_COMMITS }}. Escribe un post para LinkedIn en español.\"
                }]
              }]
            }")
          
          echo "Respuesta de la API: $RESPONSE"
          
          RESULT=$(echo $RESPONSE | jq -r '.candidates[0].content.parts[0].text // "Error: La IA no devolvió texto"')
          echo "FINAL_POST<<EOF" >> $GITHUB_ENV
          echo "$RESULT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
      - name: Enviar a Telegram
        if: env.SKIP != 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            📝 *Borrador para LinkedIn*
            
            ${{ env.FINAL_POST }}
