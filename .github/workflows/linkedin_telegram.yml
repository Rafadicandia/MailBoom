name: LinkedIn Bot via Telegram
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Datos
        run: |
          head -n 50 README.md > readme_snippet.txt
          git log --since="100 hours ago" --pretty=format:"- %s" > commits.txt
          if [ ! -s commits.txt ]; then echo "SKIP=true" >> $GITHUB_ENV; fi

      - name: Generar Post con Gemini
        if: env.SKIP != 'true'
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          CONTEXT=$(jq -Rs . < readme_snippet.txt)
          COMMITS=$(jq -Rs . < commits.txt)

          # Construimos un JSON con un prompt mucho más profesional y técnico
          JSON_DATA=$(jq -n \
            --arg ctx "$CONTEXT" \
            --arg cmt "$COMMITS" \
            '{contents: [{parts: [{text: ("Actúa como un Ingeniero de Software Senior. Escribe un post para LinkedIn en español que NO sea promocional, sino técnico y educativo.

            REGLAS:
            1. Enfócate en la arquitectura (Hexagonal/DDD) y principios SOLID.
            2. Explica el beneficio técnico de los cambios realizados hoy: " + $cmt + ".
            3. Usa el contexto del proyecto (" + $ctx + ") solo como base técnica.
            4. No uses frases de ventas como '\''¡Prueba nuestra herramienta!'\''.
            5. Habla sobre escalabilidad, robustez del backend y desacoplamiento.
            6. Estilo: Profesional, sobrio, aporta valor a otros desarrolladores.
            7. Que no supere los 1500 caracteres de extension.
            8. Estructura: Comienza con un 'hook' (gancho) potente de máximo 45 caracteres. Usa párrafos cortos (1-3 líneas) y mucho espacio en blanco.
            9. Contenido: Adopta un tono auténtico y profesional. Enfócate en aportar valor real o una lección aprendida.
            10. Formato: Usa puntos clave (bullets) para que sea escaneable. No uses más de 3 hashtags relevantes al final.
            11. Engagement: Termina con una pregunta abierta (CTA) que invite a la conversación.
            
            Escribe ÚNICAMENTE el cuerpo del post.")}]}]}')
            
          # USAMOS TU MODELO REAL: gemini-2.5-flash
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_KEY" \
            -H 'Content-Type: application/json' \
            -d "$JSON_DATA")

          RESULT=$(echo $RESPONSE | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$RESULT" ]; then
            RESULT="Error de la API: $(echo $RESPONSE | jq -c .)"
          fi
          
          echo "FINAL_POST<<EOF" >> $GITHUB_ENV
          echo "$RESULT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Enviar a Telegram
        if: env.SKIP != 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            <b>📝 Borrador para LinkedIn</b>

            ${{ env.FINAL_POST }}
