name: LinkedIn Bot via Telegram
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Datos
        id: data
        run: |
          # Guardamos el contenido en archivos temporales para evitar errores de terminal
          head -n 50 README.md > readme_snippet.txt
          git log --since="24 hours ago" --pretty=format:"- %s" > commits.txt

          if [ ! -s commits.txt ]; then
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Generar Post con Gemini
        if: env.SKIP != 'true'
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Leemos los archivos y los escapamos
          CONTEXT=$(jq -Rs . < readme_snippet.txt)
          COMMITS=$(jq -Rs . < commits.txt)

          # Construimos el JSON
          JSON_DATA=$(jq -n \
            --arg ctx "$CONTEXT" \
            --arg cmt "$COMMITS" \
            '{contents: [{parts: [{text: ("Proyecto: " + $ctx + " Cambios: " + $cmt + " Escribe un post para LinkedIn en español.")}]}]}')

          # Petición a la v1 (más estable)
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=$GEMINI_KEY" \
            -H 'Content-Type: application/json' \
            -d "$JSON_DATA")

          # Intentamos extraer el texto
          RESULT=$(echo $RESPONSE | jq -r '.candidates[0].content.parts[0].text // empty')

          # Si RESULT está vacío, capturamos el error de la API para Telegram
          if [ -z "$RESULT" ]; then
            RESULT="Error de la API de Google: $(echo $RESPONSE | jq -c .)"
          fi
          
          echo "FINAL_POST<<EOF" >> $GITHUB_ENV
          echo "$RESULT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Enviar a Telegram
        if: env.SKIP != 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            📝 *Borrador para LinkedIn*
            
            ${{ env.FINAL_POST }}
